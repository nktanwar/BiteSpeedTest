name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          cd bitespeed-server
          npm ci
      - name: Generate Prisma Client
        run: |
          cd bitespeed-server
          npx prisma generate
      - name: Run tests
        run: |
          cd bitespeed-server
          npm test --silent
